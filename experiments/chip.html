<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chip component playground</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../prototype/styles/tokens.css">
  <link rel="stylesheet" href="../prototype/styles/fonts.css">
  <link rel="stylesheet" href="../prototype/styles/layout.css">
  <link rel="stylesheet" href="../prototype/styles/base.css">
  <link rel="stylesheet" href="../prototype/styles/typography.css">
  <link rel="stylesheet" href="../prototype/styles/components/chip.css">
  <style>
    body {
      background: var(--color-surface-canvas);
      color: var(--color-content-primary);
      padding: var(--spacing-lg);
    }

    main {
      display: grid;
      gap: var(--spacing-lg);
      margin: 0 auto;
      max-width: 1200px;
    }

    .playground-card {
      background: var(--color-surface-container);
      border: var(--stroke-sm) solid var(--color-content-tertiary);
      border-radius: var(--radius-lg);
      display: grid;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
    }

    .chip-row {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-3xs);
    }

    .playground-title {
      margin: 0;
    }

    .playground-subtitle {
      color: var(--color-content-secondary);
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <section class="playground-card">
      <h1 class="playground-title text-title-large-heavy-caps">Chip component playground</h1>
      <p class="playground-subtitle text-copy-medium-regular">Hover, press, focus via keyboard, and click tablist examples.</p>
    </section>

    <section class="playground-card">
      <h2 class="playground-title text-title-medium-heavy-caps">Small solid</h2>
      <div class="chip-row">
        <button type="button" class="chip chip--small is-active text-copy-medium-regular-tight">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">directions_car</span>
          <span class="chip__label">Cars</span>
        </button>
        <button type="button" class="chip chip--small text-copy-medium-regular-tight">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">local_shipping</span>
          <span class="chip__label">Trucks</span>
        </button>
        <button type="button" class="chip chip--small text-copy-medium-regular-tight">
          <span class="material-symbols-outlined chip__icon chip__icon--outline" aria-hidden="true">update</span>
          <span class="chip__label">Subscription</span>
        </button>
        <button type="button" class="chip chip--small text-copy-medium-regular-tight">
          <span class="chip__label">No icon</span>
        </button>
      </div>
    </section>

    <section class="playground-card">
      <h2 class="playground-title text-title-medium-heavy-caps">Small outlined</h2>
      <div class="chip-row">
        <button type="button" class="chip chip--small chip--outlined text-copy-medium-regular-tight">
          <span class="chip__label">Unselected</span>
        </button>
        <button type="button" class="chip chip--small chip--outlined is-active text-copy-medium-regular-tight">
          <span class="chip__label">Selected</span>
        </button>
        <button type="button" class="chip chip--small chip--outlined text-copy-medium-regular-tight">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">bolt</span>
          <span class="chip__label">With icon</span>
        </button>
      </div>
    </section>

    <section class="playground-card">
      <h2 class="playground-title text-title-medium-heavy-caps">Large solid + sublabel</h2>
      <div class="chip-row">
        <button type="button" class="chip chip--large is-active">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">apartment</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Business profile</span>
            <span class="chip__sublabel text-copy-small-regular">12 corporate rates</span>
          </span>
        </button>
        <button type="button" class="chip chip--large">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">person</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Private profile</span>
            <span class="chip__sublabel text-copy-small-regular">Standard pricing</span>
          </span>
        </button>
      </div>
    </section>

    <section class="playground-card">
      <h2 class="playground-title text-title-medium-heavy-caps">Large outlined + sublabel</h2>
      <div class="chip-row">
        <button type="button" class="chip chip--large chip--outlined">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">flight</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Airport pickup</span>
            <span class="chip__sublabel text-copy-small-regular">Terminal 2</span>
          </span>
        </button>
        <button type="button" class="chip chip--large chip--outlined is-active">
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">home</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">City pickup</span>
            <span class="chip__sublabel text-copy-small-regular">Downtown station</span>
          </span>
        </button>
      </div>
    </section>

    <section class="playground-card">
      <h2 class="playground-title text-title-medium-heavy-caps">Disabled states</h2>
      <div class="chip-row">
        <button type="button" class="chip chip--small text-copy-medium-regular-tight" disabled>
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">bolt</span>
          <span class="chip__label">Small solid disabled</span>
        </button>
        <button type="button" class="chip chip--small chip--outlined text-copy-medium-regular-tight" disabled>
          <span class="chip__label">Small outlined disabled</span>
        </button>
      </div>
      <div class="chip-row">
        <button type="button" class="chip chip--large" disabled>
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">apartment</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Large solid disabled</span>
            <span class="chip__sublabel text-copy-small-regular">No interactions</span>
          </span>
        </button>
        <button type="button" class="chip chip--large chip--outlined" disabled>
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">home</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Large outlined disabled</span>
            <span class="chip__sublabel text-copy-small-regular">No interactions</span>
          </span>
        </button>
      </div>
      <div class="chip-row">
        <button type="button" class="chip chip--small is-active text-copy-medium-regular-tight" disabled>
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">directions_car</span>
          <span class="chip__label">Small solid disabled + selected</span>
        </button>
        <button type="button" class="chip chip--small chip--outlined is-active text-copy-medium-regular-tight" disabled>
          <span class="chip__label">Small outlined disabled + selected</span>
        </button>
      </div>
      <div class="chip-row">
        <button type="button" class="chip chip--large is-active" disabled>
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">apartment</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Large solid disabled + selected</span>
            <span class="chip__sublabel text-copy-small-regular">No interactions</span>
          </span>
        </button>
        <button type="button" class="chip chip--large chip--outlined is-active" disabled>
          <span class="material-symbols-outlined chip__icon chip__icon--filled" aria-hidden="true">home</span>
          <span class="chip__content">
            <span class="chip__label text-copy-medium-regular-tight">Large outlined disabled + selected</span>
            <span class="chip__sublabel text-copy-small-regular">No interactions</span>
          </span>
        </button>
      </div>
    </section>

    <section class="playground-card">
      <h2 class="playground-title text-title-medium-heavy-caps">Tablist behavior demo</h2>
      <div class="chip-row" role="tablist" aria-label="SEO categories demo" data-chip-tablist>
        <button type="button" class="chip chip--small is-active text-copy-medium-regular-tight" role="tab" aria-selected="true" data-demo-tab="airports">
          <span class="chip__label">US Airport locations</span>
        </button>
        <button type="button" class="chip chip--small text-copy-medium-regular-tight" role="tab" aria-selected="false" data-demo-tab="cities">
          <span class="chip__label">US cities</span>
        </button>
        <button type="button" class="chip chip--small text-copy-medium-regular-tight" role="tab" aria-selected="false" data-demo-tab="worldwide">
          <span class="chip__label">Worldwide</span>
        </button>
        <button type="button" class="chip chip--small text-copy-medium-regular-tight" role="tab" aria-selected="false" data-demo-tab="metro" disabled>
          <span class="chip__label">Metro areas (disabled)</span>
        </button>
      </div>
    </section>
  </main>

  <script>
    (function initChipTablistDemo() {
      const tablist = document.querySelector("[data-chip-tablist]");
      if (!tablist) {
        return;
      }

      const buttons = Array.from(tablist.querySelectorAll("[data-demo-tab]"));
      const setActive = (activeKey) => {
        buttons.forEach((button) => {
          const isActive = button.dataset.demoTab === activeKey;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-selected", isActive ? "true" : "false");
        });
      };

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const activeKey = button.dataset.demoTab;
          if (!activeKey) {
            return;
          }
          setActive(activeKey);
        });
      });
    })();
  </script>
</body>
</html>
