<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Floating button component playground</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../prototype/styles/tokens.css">
  <link rel="stylesheet" href="../prototype/styles/fonts.css">
  <link rel="stylesheet" href="../prototype/styles/layout.css">
  <link rel="stylesheet" href="../prototype/styles/base.css">
  <link rel="stylesheet" href="../prototype/styles/typography.css">
  <link rel="stylesheet" href="../prototype/styles/components/floating-button.css">
  <style>
    body {
      background: var(--color-surface-canvas);
      color: var(--color-content-primary);
      padding: var(--spacing-lg);
    }

    main {
      display: grid;
      gap: var(--spacing-lg);
      margin: 0 auto;
      max-width: 1200px;
    }

    .playground-card {
      background: var(--color-surface-container);
      border: var(--stroke-sm) solid var(--color-content-tertiary);
      border-radius: var(--radius-lg);
      display: grid;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
    }

    .playground-title,
    .playground-subtitle {
      margin: 0;
    }

    .playground-subtitle {
      color: var(--color-content-secondary);
    }

    .playground-grid {
      display: grid;
      gap: var(--spacing-md);
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .variant-group {
      display: grid;
      gap: var(--spacing-2xs);
    }

    .variant-row {
      align-items: center;
      display: flex;
      gap: var(--spacing-2xs);
      min-height: 48px;
    }

    .variant-label {
      color: var(--color-content-secondary);
      margin: 0;
      min-width: 52px;
    }
  </style>
</head>
<body>
  <main>
    <section class="playground-card">
      <h1 class="playground-title text-title-large-heavy-caps">Floating button playground</h1>
      <p class="playground-subtitle text-copy-medium-regular">Test hover, press, keyboard focus ring, and disabled behavior for all planned size and content combinations.</p>
    </section>

    <section class="playground-card" data-p100-theme="option-light">
      <h2 class="playground-title text-title-medium-heavy-caps">Option theme buttons on prime canvas</h2>
      <div class="playground-grid">
        <article class="variant-group">
          <h3 class="text-copy-medium-heavy-tight playground-title">Icon only</h3>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">small</p>
            <button type="button" class="floating-button floating-button--small floating-button--icon-only" aria-label="Back">
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">chevron_left</span>
            </button>
            <button type="button" class="floating-button floating-button--small floating-button--icon-only" aria-label="Back disabled" disabled>
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">chevron_left</span>
            </button>
          </div>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">medium</p>
            <button type="button" class="floating-button floating-button--medium floating-button--icon-only" aria-label="Next">
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">chevron_right</span>
            </button>
            <button type="button" class="floating-button floating-button--medium floating-button--icon-only" aria-label="Next disabled" disabled>
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">chevron_right</span>
            </button>
          </div>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">large</p>
            <button type="button" class="floating-button floating-button--large floating-button--icon-only" aria-label="Close">
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">close</span>
            </button>
            <button type="button" class="floating-button floating-button--large floating-button--icon-only" aria-label="Close disabled" disabled>
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">close</span>
            </button>
          </div>
        </article>

        <article class="variant-group">
          <h3 class="text-copy-medium-heavy-tight playground-title">Text only</h3>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">small</p>
            <button type="button" class="floating-button floating-button--small floating-button--text-only">
              <span class="floating-button__label text-copy-small-heavy-tight">Back</span>
            </button>
            <button type="button" class="floating-button floating-button--small floating-button--text-only" disabled>
              <span class="floating-button__label text-copy-small-heavy-tight">Back</span>
            </button>
          </div>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">medium</p>
            <button type="button" class="floating-button floating-button--medium floating-button--text-only">
              <span class="floating-button__label text-copy-medium-heavy-tight">Details</span>
            </button>
            <button type="button" class="floating-button floating-button--medium floating-button--text-only" disabled>
              <span class="floating-button__label text-copy-medium-heavy-tight">Details</span>
            </button>
          </div>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">large</p>
            <button type="button" class="floating-button floating-button--large floating-button--text-only">
              <span class="floating-button__label text-copy-medium-heavy-tight">Continue</span>
            </button>
            <button type="button" class="floating-button floating-button--large floating-button--text-only" disabled>
              <span class="floating-button__label text-copy-medium-heavy-tight">Continue</span>
            </button>
          </div>
        </article>

        <article class="variant-group">
          <h3 class="text-copy-medium-heavy-tight playground-title">Icon + text</h3>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">small</p>
            <button type="button" class="floating-button floating-button--small floating-button--icon-text">
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">add</span>
              <span class="floating-button__label text-copy-small-heavy-tight">Add</span>
            </button>
            <button type="button" class="floating-button floating-button--small floating-button--icon-text" disabled>
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">add</span>
              <span class="floating-button__label text-copy-small-heavy-tight">Add</span>
            </button>
          </div>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">medium</p>
            <button type="button" class="floating-button floating-button--medium floating-button--icon-text">
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">tune</span>
              <span class="floating-button__label text-copy-medium-heavy-tight">Filters</span>
            </button>
            <button type="button" class="floating-button floating-button--medium floating-button--icon-text" disabled>
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">tune</span>
              <span class="floating-button__label text-copy-medium-heavy-tight">Filters</span>
            </button>
          </div>
          <div class="variant-row">
            <p class="variant-label text-copy-small-regular">large</p>
            <button type="button" class="floating-button floating-button--large floating-button--icon-text">
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">navigation</span>
              <span class="floating-button__label text-copy-medium-heavy-tight">Navigate</span>
            </button>
            <button type="button" class="floating-button floating-button--large floating-button--icon-text" disabled>
              <span class="material-symbols-outlined floating-button__icon" aria-hidden="true">navigation</span>
              <span class="floating-button__label text-copy-medium-heavy-tight">Navigate</span>
            </button>
          </div>
        </article>
      </div>
    </section>

  </main>
</body>
</html>
