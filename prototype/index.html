<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P100 Booking Prototype</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/base.css">
  <style>
    body {
      align-items: center;
      display: grid;
      min-height: 100vh;
      padding: var(--spacing-lg) var(--spacing-xs);
      place-items: center;
    }

    main {
      background-color: var(--color-surface-container);
      border-radius: var(--radius-lg);
      box-shadow: var(--elevation-medium);
      max-width: 720px;
      padding: var(--spacing-lg);
      width: 100%;
    }

    h1 {
      font-family: "Helvetica Now Display", Helvetica, Arial, sans-serif;
      font-size: var(--typography-font-size-medium-title);
      margin: 0 0 var(--spacing-xs);
      text-transform: uppercase;
    }

    p {
      color: var(--color-content-secondary);
      font-size: var(--typography-font-size-large-copy);
      line-height: 1.4;
      margin: 0 0 var(--spacing-md);
    }

    .links {
      display: flex;
      gap: var(--spacing-2xs);
      flex-wrap: wrap;
    }

    a {
      background-color: var(--color-content-extended-brand);
      border-radius: var(--radius-md);
      color: var(--color-on-content-extended-on-brand);
      display: inline-block;
      font-size: var(--typography-font-size-medium-copy);
      font-weight: 700;
      min-width: 128px;
      padding: var(--spacing-2xs) var(--spacing-xs);
      text-align: center;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Booking Prototype</h1>
    <p>Use this index as local entrypoint for page-by-page funnel prototyping.</p>
    <div class="links">
      <a href="./pages/home.html">Open Home</a>
      <a href="./pages/results.html">Open Results</a>
    </div>
  </main>
</body>
</html>
