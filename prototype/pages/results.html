<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Prototype - Results</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background-color: var(--color-surface-canvas);
      color: var(--color-content-primary);
      display: grid;
      font-family: "Helvetica Now Text", Helvetica, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      padding: var(--spacing-lg) var(--spacing-xs);
      place-items: center;
    }

    main {
      background-color: var(--color-surface-container);
      border-radius: var(--radius-lg);
      box-shadow: var(--elevation-medium);
      max-width: 720px;
      padding: var(--spacing-lg);
      width: 100%;
    }

    h1 {
      font-family: "Helvetica Now Display", Helvetica, Arial, sans-serif;
      font-size: var(--typography-font-size-medium-title);
      margin: 0 0 var(--spacing-sm);
      text-transform: uppercase;
    }

    p {
      font-size: var(--typography-font-size-large-copy);
      line-height: 1.4;
      margin: 0 0 var(--spacing-md);
    }

    a {
      background-color: var(--color-content-extended-brand);
      border-radius: var(--radius-md);
      color: var(--color-on-content-extended-on-brand);
      display: inline-block;
      font-size: var(--typography-font-size-medium-copy);
      font-weight: 700;
      min-width: 128px;
      padding: var(--spacing-2xs) var(--spacing-xs);
      text-align: center;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Results Placeholder</h1>
    <p>This page is intentionally lightweight for MVP routing validation from `home`.</p>
    <a href="./home.html">Back to Home</a>
  </main>
</body>
</html>
